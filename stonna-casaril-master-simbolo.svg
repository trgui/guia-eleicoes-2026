<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" width="100%" height="100%">
  <defs>
    <style>
      @import url('https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@400&amp;display=swap');
      
      /* Variáveis de Cor Master */
      :root {
        --azul-aco: #3A4A5C;
        --carvao: #1A2330;
      }
      
      .monograma-master-iso { font-family: 'Cormorant Garamond', serif; font-size: 120px; font-weight: 400; }
    </style>
  </defs>

  <g id="fundo">
    <rect width="200" height="200" fill="transparent" />
  </g>

  <g id="simbolo" transform="translate(45, 140)">
    <text x="40" y="0" class="monograma-master-iso" fill="var(--azul-aco)" opacity="0.85">C</text>
    <text x="0" y="-15" class="monograma-master-iso" fill="var(--carvao)">S</text>
  </g>
</svg>
